# Weekly collectors (credit-metered sources like Leak-Lookup) — MANUAL ONLY here
# (scheduled cron is disabled). Shares the same lake branch as the daily run.
# WARNING: on a PUBLIC repo a run commits a world-readable findings lake. Run
# real monitoring from a PRIVATE repo or use private lake storage (deploy/README.md).
# Re-enable automatic runs (private repo only) by adding back a `schedule:` trigger.

name: Weekly risk monitor

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print the Slack payload instead of posting"
        type: boolean
        default: false

jobs:
  collect:
    uses: ./.github/workflows/risk-monitor.yml
    secrets: inherit
    with:
      cadence: weekly
      dry_run: ${{ inputs.dry_run == true }}
