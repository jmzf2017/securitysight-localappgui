# Daily collectors. Cron is UTC; 07:00 UTC here. GitHub may delay scheduled
# runs under load, so don't treat the time as exact. Trigger manually any time
# WARNING: on a PUBLIC repo this commits a world-readable findings lake. Run real
# monitoring from a private repo or use private lake storage (see deploy/README.md).
# from the Actions tab ("Run workflow"), optionally as a dry run.

name: Daily risk monitor

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print the Slack payload instead of posting"
        type: boolean
        default: false

jobs:
  collect:
    uses: ./.github/workflows/risk-monitor.yml
    secrets: inherit
    with:
      cadence: daily
      dry_run: ${{ inputs.dry_run == true }}
